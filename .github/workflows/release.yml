name: Release

# Publishes to npm with provenance when a GitHub Release is published.
# Requires an NPM_TOKEN repository secret (an npm automation token).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify (lint, types, tests, package)
        run: |
          npm run lint
          npm run typecheck
          npm run test:run
          npm run build
          npm run publint
          npm run attw
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
