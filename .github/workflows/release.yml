name: Release

# Publishes to npm via OIDC Trusted Publishing (no NPM_TOKEN needed).
# Provenance is generated automatically when publishing this way.
# npm Trusted Publisher must be configured with:
#   repository: petar-basic/reactilities
#   workflow filename: release.yml   (must match THIS file's name)
#   environment: (leave blank — this job sets no environment)
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm >= 11.5.1, required for OIDC trusted publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify (lint, types, tests, package)
        run: |
          npm run lint
          npm run typecheck
          npm run test:run
          npm run build
          npm run publint
          npm run attw
      - name: Publish (OIDC trusted publishing, automatic provenance)
        run: npm publish
